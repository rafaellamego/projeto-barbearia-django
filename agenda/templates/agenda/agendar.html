{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento - Agenda Aí</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html {
            background-color: #0a0519;
        }
        body {
            background: linear-gradient(rgba(25,10,40,0.75), rgba(10,5,25,0.85)), url('{% static "fundo_barbearia.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            margin: 0;
            color: white;
            padding-bottom: 75px;
        }

        .top-bar {
            background: rgba(40,20,60,0.3);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            opacity: 0.7;
        }

        .top-bar a:hover {
            opacity: 1;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select, input[type="date"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
        }

        select option {
            background: #0a0519;
        }

        .horarios-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .horario-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .horario-btn:hover {
            background: #667eea;
        }

        .horario-btn.selected {
            background: #764ba2;
            border-color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118,75,162,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            width: 100%;
            text-align: center;
        }

        .footer-social {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 5, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 1000;
        }

        .social-item {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.8;
        }

        .social-item:hover {
            opacity: 1;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(220,53,69,0.3);
            border: 1px solid #dc3545;
        }

        .alert-success {
            background: rgba(40,167,69,0.3);
            border: 1px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>💈 Agenda Aí - Novo Agendamento</span>
        <div>
            <a href="{% url 'home_cliente' %}"><i class="fas fa-home"></i> Home</a>
            <a href="{% url 'meus_agendamentos' %}"><i class="fas fa-calendar-alt"></i> Meus Agendamentos</a>
            <a href="{% url 'logout_cliente' %}"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <i class="fas fa-calendar-plus" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h2>📅 Novo Agendamento</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'salvar_agendamento' %}" id="form-agendamento">
                {% csrf_token %}

                <div class="form-group">
                    <label><i class="fas fa-cut"></i> Serviço:</label>
                    <select name="servico_id" id="servico" required>
                        <option value="">-- Selecione --</option>
                        {% for servico in servicos %}
                        <option value="{{ servico.id }}">{{ servico.nome }} - R$ {{ servico.valor }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Barbeiro:</label>
                    <select name="barbeiro_id" id="barbeiro" required>
                        <option value="">-- Selecione --</option>
                        {% for barbeiro in barbeiros %}
                        <option value="{{ barbeiro.id }}">{{ barbeiro.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> Data:</label>
                    <input type="date" name="data" id="data" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Horário:</label>
                    <div id="horarios" class="horarios-grid"></div>
                    <input type="hidden" name="horario" id="horario_selecionado">
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-check-circle"></i> Confirmar Agendamento
                </button>
                <a href="{% url 'home_cliente' %}" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
            </form>
        </div>
    </div>

    <div class="footer-social">
        <a href="#" class="social-item"><i class="fab fa-instagram"></i> @AgendaAi</a>
        <a href="#" class="social-item"><i class="fab fa-whatsapp"></i> (11) 99999-9999</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#servico, #barbeiro, #data').change(function() {
            var barbeiro = $('#barbeiro').val();
            var data = $('#data').val();
            
            if (barbeiro && data) {
                $.get('/get-horarios/', {
                    'barbeiro_id': barbeiro,
                    'data': data
                }, function(response) {
                    var container = $('#horarios');
                    container.empty();
                    if (response.horarios && response.horarios.length > 0) {
                        response.horarios.forEach(function(h) {
                            var btn = $('<div>').addClass('horario-btn').text(h);
                            btn.click(function() {
                                $('.horario-btn').removeClass('selected');
                                $(this).addClass('selected');
                                $('#horario_selecionado').val(h);
                            });
                            container.append(btn);
                        });
                    } else {
                        container.html('<p style="color: rgba(255,255,255,0.7);">Nenhum horário disponível nesta data.</p>');
                    }
                });
            }
        });

        $('#form-agendamento').submit(function(e) {
            if (!$('#horario_selecionado').val()) {
                e.preventDefault();
                alert('Por favor, selecione um horário!');
            }
        });
    </script>
</body>
</html>
