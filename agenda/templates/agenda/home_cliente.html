{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Agenda Aí</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html {
            background-color: #0a0519;
        }
        body {
            background: linear-gradient(rgba(25,10,40,0.75), rgba(10,5,25,0.85)), url('{% static "fundo_barbearia.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            margin: 0;
            color: white;
            padding-bottom: 75px;
        }

        .top-bar {
            background: rgba(40,20,60,0.3);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            opacity: 0.7;
        }

        .top-bar a:hover {
            opacity: 1;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
        }

        .card i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #764ba2;
        }

        .card h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .btn-agendar {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-agendar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118,75,162,0.4);
        }

        .footer-social {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 5, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 1000;
        }

        .social-item {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.8;
        }

        .social-item:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>💈 Agenda Aí - Área do Cliente</span>
        <div>
            <a href="{% url 'meus_agendamentos' %}"><i class="fas fa-calendar-alt"></i> Meus Agendamentos</a>
            <a href="{% url "agendamento" %}"><i class="fas fa-calendar-plus"></i> Novo Agendamento</a>
            <a href="{% url 'logout_cliente' %}"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <i class="fas fa-cut"></i>
            <h1>Bem-vindo, {{ nome_cliente }}!</h1>
            <p>Gerencie seus horários de forma fácil e rápida.</p>
            
            <a href="{% url "agendamento" %}" class="btn-agendar">
                <i class="fas fa-calendar-check"></i> Agendar Horário
            </a>
        </div>
    </div>

    <div class="footer-social">
        <a href="{% url "agendamento" %}" class="social-item"><i class="fab fa-instagram"></i> @AgendaAi</a>
        <a href="{% url "agendamento" %}" class="social-item"><i class="fab fa-whatsapp"></i> (11) 99999-9999</a>
    </div>
</body>
</html>
