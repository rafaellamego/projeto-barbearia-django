    <style>
        :root {
            --purple-glass: rgba(168, 85, 247, 0.2);
            --purple-bright: #a855f7;
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        html { background-color: #0a0519; }
        body {
            background: linear-gradient(rgba(25,10,40,0.8), rgba(10,5,25,0.9)), url('{% static "fundo_barbearia.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            margin: 0;
            color: white;
            display: flex; /* Para a Sidebar funcionar lado a lado */
            min-height: 100vh;
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 260px;
            background: rgba(20, 10, 30, 0.6);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 { font-size: 1.2rem; margin-bottom: 40px; color: var(--purple-bright); text-align: center; }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }

        .menu-item i { font-size: 1.2rem; margin-right: 15px; margin-bottom: 0; opacity: 1; width: 25px; }
        .menu-item:hover { background: var(--purple-glass); color: white; }
        .menu-item.active { background: var(--purple-glass); border-left: 4px solid var(--purple-bright); color: white; }

        /* --- CONTEÚDO PRINCIPAL --- */
        main {
            flex: 1;
            margin-left: 260px; /* Espaço para a sidebar */
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        /* --- KANBAN --- */
        .kanban-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
        }

        .kanban-column {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 15px;
            width: 280px;
            min-height: 450px;
        }

        .column-header {
            text-align: center;
            padding: 10px 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .column-header i { font-size: 1.5rem; margin-bottom: 10px; color: var(--purple-bright); }

        /* --- CARDS (Drag & Drop) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: grab;
            transition: 0.2s;
        }

        .glass-card:active { cursor: grabbing; }
        .glass-card.active { border-left: 4px solid var(--purple-bright); }
        .sortable-ghost { opacity: 0.3; transform: scale(0.9); }

        .time-slot { color: var(--purple-bright); font-weight: bold; margin-bottom: 5px; }
        .client-details h3 { margin: 0; font-size: 1rem; }
        .client-details span { font-size: 0.8rem; opacity: 0.6; }

        /* --- CALENDÁRIO --- */
        .calendar-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 15px;
            width: 220px;
        }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem; }
        .calendar-header button { background: none; border: none; color: white; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 0.8rem; }
        .today { background: var(--purple-bright); border-radius: 5px; font-weight: bold; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar h2, .menu-item span { display: none; }
            main { margin-left: 80px; }
        }
    </style>
</head>

    <script>
    // 1. Configuração do Calendário Dinâmico 
    
    /*    CONFLITO DE CODIGO A RESOLVER MARCEL *************************
    const monthDisplay = document.getElementById('monthDisplay');
    const calendarGrid = document.getElementById('calendarGrid');
    let date = new Date();

    function renderCalendar() {
        const headers = Array.from(calendarGrid.children).slice(0, 7);
        calendarGrid.innerHTML = '';
        headers.forEach(h => calendarGrid.appendChild(h));

        const day = new Date(date.getFullYear(), date.getMonth(), 1);
        const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const firstDayIndex = day.getDay();
        const today = new Date();

        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        monthDisplay.innerText = `${months[date.getMonth()]} ${date.getFullYear()}`;

        for (let x = 0; x < firstDayIndex; x++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.classList.add('day');
            calendarGrid.appendChild(emptyDiv);
        }

        for (let i = 1; i <= lastDay; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.classList.add('day');
            if (i === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear()) {
                dayDiv.classList.add('today');
            }
            dayDiv.innerText = i;
            calendarGrid.appendChild(dayDiv);
        }
    }
    FIM   **********************************************/

    // 2. Configuração do Kanban e Exclusão
    const colunas = ['pendentes', 'execucao', 'concluidos'];
    const deleteZone = document.getElementById('delete-zone');

    // Inicializa as colunas do Kanban
    colunas.forEach(id => {
        new Sortable(document.getElementById(id), {
            group: 'kanban',
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                // Verifica se o item foi solto sobre a zona de excluir
                // O SortableJS não detecta nativamente elementos fora de grupos, 
                // então usamos a posição do mouse ou o elemento alvo.
            }
        });
    });

    // Inicializa a Zona de Exclusão
    new Sortable(deleteZone, {
        group: 'kanban',
        onAdd: function (evt) {
            const el = evt.item;
            if (confirm("Deseja excluir este agendamento?")) {
                el.parentNode.removeChild(el);
                // Aqui você pode adicionar o comando para excluir no banco de dados Django:
                // fetch('/excluir-agendamento/' + id, { method: 'POST' });
            } else {
                // Se cancelar, devolve o item para a lista de origem
                evt.from.appendChild(el);
            }
        }
    });

    // 3. Data Atual no Título
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', options);

    renderCalendar();
</script>

<!-- SCRIPT FUNCAO CALENDARIO INICIO   MARCEL   -->
<script>
    const monthDisplay = document.getElementById('monthDisplay');
    const calendarGrid = document.getElementById('calendarGrid');
    let date = new Date();

    function renderCalendar() {
        // Limpar dias anteriores (mantendo os cabeçalhos D, S, T...)
        const headers = Array.from(calendarGrid.children).slice(0, 7);
        calendarGrid.innerHTML = '';
        headers.forEach(h => calendarGrid.appendChild(h));

        const day = new Date(date.getFullYear(), date.getMonth(), 1);
        const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const firstDayIndex = day.getDay();
        const today = new Date();

        // Nome do mês e ano
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        monthDisplay.innerText = `${months[date.getMonth()]} ${date.getFullYear()}`;

        // Espaços vazios antes do primeiro dia
        for (let x = 0; x < firstDayIndex; x++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.classList.add('day');
            calendarGrid.appendChild(emptyDiv);
        }

        // Preencher os dias
        for (let i = 1; i <= lastDay; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.classList.add('day');
            if (i === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear()) {
                dayDiv.classList.add('today');
            }
            dayDiv.innerText = i;
            calendarGrid.appendChild(dayDiv);
        }
    }

    // Botões de navegação (Opcional)
    document.getElementById('prevMonth').addEventListener('click', () => {
        date.setMonth(date.getMonth() - 1);
        renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
        date.setMonth(date.getMonth() + 1);
        renderCalendar();
    });

    renderCalendar();
</script>
