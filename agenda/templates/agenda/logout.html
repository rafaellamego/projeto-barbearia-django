{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saindo - Agenda Aí</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { background-color: #0a0519; }
        body {
            background: linear-gradient(rgba(25,10,40,0.8), rgba(10,5,25,0.9)), url('{% static "fundo_barbearia.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            margin: 0;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            max-width: 400px;
        }
        i { font-size: 4rem; margin-bottom: 20px; color: #764ba2; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-sign-out-alt"></i>
        <h2>Você saiu do sistema</h2>
        <p>Obrigado por usar o Agenda Aí!</p>
        <a href="{% url 'login' %}" class="btn">Fazer login novamente</a>
    </div>
</body>
</html>
