/* Adicione dentro da tag <style> existente */

.kanban-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 25px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.kanban-column {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 20px;
    width: 280px; 
    min-height: 300px;
}

/* ... e as outras regras de .calendar-glass, .day, .time-slot, etc. */






        /* Reutilizando seu CSS de vidro roxo */
        html { background-color: #0a0519; }
        body {
            background: linear-gradient(rgba(25,10,40,0.8), rgba(10,5,25,0.9)), url('{% static "fundo_barbearia.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            margin: 0;
            color: white;
            min-height: 100vh;
        }

        .top-bar {
            background: rgba(40,20,60,0.3);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 35px;
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            padding: 20px;
        }

        .card-info {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        i { font-size: 3.5rem; margin-bottom: 20px; opacity: 0.7; }
        h1 { margin-bottom: 10px; }
        p { opacity: 0.8; line-height: 1.6; }



        /* Layout Kanban */
.kanban-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.kanban-column {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 20px;
    padding: 15px;
    min-height: 400px;
}

.column-header {
    text-align: center;
    padding-bottom: 15px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
}

.kanban-item {
    margin-bottom: 15px;
    cursor: grab;
}

.kanban-item.done {
    opacity: 0.5;
    border-left-color: #10b981;
}

/* Estilo do Calendário */
.calendar-glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 20px;
    width: 280px;
    margin-bottom: 30px;
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    gap: 5px;
}

.day-name { font-size: 0.7rem; opacity: 0.5; margin-bottom: 5px; }

.day {
    padding: 8px 0;
    font-size: 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.day:hover { background: rgba(168, 85, 247, 0.3); }

.today {
    background: #a855f7;
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
    font-weight: bold;
}

/* Responsividade para o Kanban */
@media (max-width: 768px) {
    .kanban-container { grid-template-columns: 1fr; }
}
    </style>
</head>



<div class="calendar-glass">
    <div class="calendar-header">
        <button><i class="fas fa-chevron-left"></i></button>
        <span>Abril 2026</span>
        <button><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="calendar-grid">
        <div class="day-name">D</div><div class="day-name">S</div><div class="day-name">T</div>
        <div class="day-name">Q</div><div class="day-name">Q</div><div class="day-name">S</div><div class="day-name">S</div>
        <div class="day empty"></div><div class="day">1</div><div class="day">2</div>
        <div class="day today">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div>
    </div>
</div>

<div class="kanban-container">

                <h3>Marcos Souza</h3>

            </div>
        </div>
    </div>

    <div class="kanban-column">

            <div class="client-details">
                <h3>Ricardo Oliveira</h3>
                <span>Barboterapia</span>
            </div>
        </div>
    </div>
</div>
